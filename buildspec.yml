version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_NAME: url-shortener
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging into ECR
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPO_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPO_URI

  build:
    commands:
      - echo Building Docker image
      - docker build -t $IMAGE_REPO_NAME app/
      - docker tag $IMAGE_REPO_NAME:latest $REPO_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing to ECR
      - docker push $REPO_URI:$IMAGE_TAG
      - echo Deploying to EKS
      - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name url-shortener
      - kubectl apply -f k8s/

artifacts:
  files:
    - '**/*'
