apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: 000418617326.dkr.ecr.us-east-1.amazonaws.com/url-shortener:latest
          ports:
            - containerPort: 5000
          livenessProbe:
              httpGet:
                  path: /health
                  port: 5000
              initialDelaySeconds: 5
              periodSeconds: 10
